# XingAI portfolio — Project Pick Agent context
# Keep in sync with xingai-dot-app/app/data/apps.ts when products change.

version: 1
updated: "2026-07-14"

principles:
  - Decision surfaces over chat shells
  - Mobile-first; en / zh / ko; light/dark; legal pages before "shipped"
  - Prefer upgrade of an existing *.xingai.app over orphan new domains
  - Invest AI: worker owns decisions; FastAPI read-only (ADR-012)
  - Primary sources only for Radar-derived bets


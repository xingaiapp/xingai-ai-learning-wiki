infra_not_consumer_apps:
  - id: opportunity-radar-editorial
    name: Opportunity Radar (editorial)
    role: weekly issues + newsletter — not a user product
  - id: robinhood-mcp
    name: Robinhood MCP gateway
    role: gated trading tools / fail-closed execution
  - id: agent-firewall
    name: Agent Firewall
    role: agent governance / approval / ledger
  - id: engineering-system
    name: XingAI Engineering System
    role: rules, skills, templates

do_not_build:
  - Generic chatbot wrappers with no decision output
  - New product that recomputes Invest decisions in the request path
  - Payment/medical-compliance-first MVP before legal pages exist
  - SEO/news aggregator Radar (primary sources only)
  - Duplicate Founder product inside the editorial repo

prefer_upgrade_when:
  - Bet strengthens audit/trust/governance → agent-firewall or robinhood-mcp or invest reports
  - Bet is research→product → research or founder
  - Bet is inference/cost/market tracking → invest (tracker surface) not a new broker
  - Bet is team Slack agent ops → may be new vertical ONLY if firewall cannot absorb MVP
